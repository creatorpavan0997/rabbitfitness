{% extends 'tracker/base.html' %}
{% block title %}Track Weight | 🐰 Rabbit Fitness{% endblock %}
{% block content %}
<!-- Include Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="row">
    <!-- Chart / Visual Area -->
    <div class="col-lg-7 mb-4">
        <div class="glass-card">
            <h3 class="fw-bold mb-4">📈 Weight Progress Chart</h3>
            <div style="position: relative; height: 320px; width: 100%;">
                <canvas id="weightHistoryChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Weight Logging & History -->
    <div class="col-lg-5">
        <div class="glass-card">
            <h3 class="fw-bold mb-4">⚖️ Log Weight</h3>
            
            <form id="weight-log-form" class="row align-items-end g-3">
                <div class="col-sm-6">
                    <label for="weight-input" class="form-label fw-semibold text-muted">Weight (kg)</label>
                    <input type="number" id="weight-input" class="form-control" placeholder="e.g. 72.5" required min="1" step="0.1">
                </div>
                <div class="col-sm-6">
                    <label for="weight-date" class="form-label fw-semibold text-muted">Date</label>
                    <input type="date" id="weight-date" class="form-control" required>
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary w-100 py-3">Log Weight</button>
                </div>
            </form>

            <h4 class="fw-bold mt-5 mb-3 text-secondary border-bottom pb-2">📅 Weight Log History</h4>
            <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                <table class="table table-hover text-white align-middle" style="color: var(--text-main) !important;">
                    <thead>
                        <tr class="text-muted border-secondary">
                            <th>Date</th>
                            <th class="text-end">Weight</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody id="weight-history-table">
                        <tr>
                            <td colspan="3" class="text-center text-muted small py-4">No weight logs recorded yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let weightChart = null;

    // Set today's date in datepicker by default
    document.getElementById('weight-date').value = new Date().toISOString().split('T')[0];

    async function loadWeightData() {
        try {
            // Load dashboard data to get goals and charting details
            const dashData = await apiRequest('/api/dashboard-data/');
            const targetWeight = parseFloat(dashData.goal.target_weight);
            
            // Load weight logs
            const logs = await apiRequest('/api/weight-log/');
            
            renderHistoryTable(logs);
            renderWeightChart(logs, targetWeight);
        } catch (err) {
            console.error("Failed to load weight metrics:", err);
        }
    }

    function renderHistoryTable(logs) {
        const tbody = document.getElementById('weight-history-table');
        tbody.innerHTML = '';

        if (logs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted small py-4">No weight logs recorded yet.</td></tr>`;
            return;
        }

        logs.forEach(log => {
            const tr = document.createElement('tr');
            tr.className = 'border-secondary';
            tr.innerHTML = `
                <td>${log.logged_at}</td>
                <td class="text-end fw-bold text-primary">${log.weight} kg</td>
                <td class="text-end">
                    <button type="button" class="btn btn-outline-danger btn-sm border-0" onclick="deleteWeightLog(${log.id})">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderWeightChart(logs, targetWeight) {
        const canvas = document.getElementById('weightHistoryChart');
        if (!canvas) return;

        // Sort logs Chronologically for charting
        const sortedLogs = [...logs].reverse();
        const labels = sortedLogs.map(log => {
            const dateObj = new Date(log.logged_at);
            return dateObj.toLocaleDateString(undefined, {month: 'numeric', day: 'numeric'});
        });
        const weights = sortedLogs.map(log => parseFloat(log.weight));
        
        // Generate baseline targets line
        const targetLine = Array(weights.length).fill(targetWeight);

        // Styling helpers
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const textColor = isDark ? '#e3e8f0' : '#1e293b';
        const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';

        if (weightChart) {
            weightChart.destroy();
        }

        weightChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Weight (kg)',
                        data: weights,
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        borderWidth: 3
                    },
                    {
                        label: 'Target Goal',
                        data: targetLine,
                        borderColor: '#28dc82',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0,
                        borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: textColor }
                    }
                },
                scales: {
                    x: {
                        grid: { color: gridColor },
                        ticks: { color: textColor }
                    },
                    y: {
                        grid: { color: gridColor },
                        ticks: { color: textColor }
                    }
                }
            }
        });
    }

    // Submit log
    document.getElementById('weight-log-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const weight = parseFloat(document.getElementById('weight-input').value);
        const loggedAt = document.getElementById('weight-date').value;
        if (!weight || !loggedAt) return;

        try {
            await apiRequest('/api/weight-log/', 'POST', {
                weight: weight,
                logged_at: loggedAt
            });
            document.getElementById('weight-input').value = '';
            loadWeightData();
        } catch (err) {
            alert("Failed to log weight: " + err.message);
        }
    });

    // Delete log
    async function deleteWeightLog(logId) {
        if (!confirm("Are you sure you want to delete this weight log?")) return;
        try {
            await apiRequest(`/api/weight-log/${logId}/`, 'DELETE');
            loadWeightData();
        } catch (err) {
            alert("Failed to delete log: " + err.message);
        }
    }

    // Hook chart update on theme toggler
    window.renderCharts = loadWeightData;

    // Initialize state
    loadWeightData();
</script>
{% endblock %}
