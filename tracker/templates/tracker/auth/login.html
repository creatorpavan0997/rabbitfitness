{% extends 'tracker/base.html' %}
{% block title %}Login | 🐰 Rabbit Fitness{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center auth-wrapper">
    <div class="col-md-5">
        <div class="glass-card text-center p-5">
            <h2 class="fw-bold mb-3 text-primary">⚡ Welcome Back</h2>
            <p class="text-muted mb-4">Log in to track your fitness and nutrition goals</p>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3 text-start">
                    <label for="username" class="form-label fw-semibold text-muted">Username</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                
                <div class="mb-4 text-start">
                    <div class="d-flex justify-content-between align-items-center">
                        <label for="password" class="form-label fw-semibold text-muted">Password</label>
                        <a href="{% url 'password_reset' %}" class="text-decoration-none text-primary small">Forgot password?</a>
                    </div>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 mb-3">Sign In</button>
            </form>
            
            <p class="mb-0 text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
