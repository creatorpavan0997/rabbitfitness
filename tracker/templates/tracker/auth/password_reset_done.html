{% extends 'tracker/base.html' %}
{% block title %}Reset Sent | 🐰 Rabbit Fitness{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center auth-wrapper">
    <div class="col-md-5">
        <div class="glass-card text-center p-5">
            <h2 class="fw-bold mb-3 text-primary">✉️ Email Dispatched</h2>
            <p class="text-muted mb-4">We have sent instructions for resetting your password. If an account matches that email, you will receive it shortly.</p>
            <a href="{% url 'login' %}" class="btn btn-primary w-100 py-3">Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}
