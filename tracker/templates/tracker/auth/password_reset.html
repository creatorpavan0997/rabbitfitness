{% extends 'tracker/base.html' %}
{% block title %}Reset Password | 🐰 Rabbit Fitness{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center auth-wrapper">
    <div class="col-md-5">
        <div class="glass-card text-center p-5">
            <h2 class="fw-bold mb-3 text-primary">🔑 Reset Password</h2>
            <p class="text-muted mb-4">Enter your email address to receive a password reset link.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label for="id_email" class="form-label fw-semibold text-muted">Email Address</label>
                    <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 mb-3">Send Reset Link</button>
            </form>
            
            <p class="mb-0 text-muted"><a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
